<!-- Create Alert Modal -->
<div class="modal fade" id="createAlertModal" tabindex="-1" aria-labelledby="createAlertModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 20px; overflow: hidden;">
            
            <!-- Modal Header -->
            <div class="modal-header border-bottom-0 p-4" style="background-color: #f8fafc;">
                <div class="d-flex align-items-center">
                    <div class="bg-primary-subtle text-primary p-2 rounded-3 me-3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
                        </svg>
                    </div>
                    <h5 class="modal-title fw-bold text-dark mb-0" id="createAlertModalLabel" style="letter-spacing: -0.5px;">Create Emergency Alert</h5>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <!-- Modal Body -->
            <div class="modal-body p-4 p-lg-5">
                <!-- Dynamic Alert Messages -->
                <div id="alertModalMessage" class="mb-4" style="display: none;"></div>

                <form id="createAlertForm" novalidate>
                    <div class="row g-4">
                        <!-- Alert Type -->
                        <div class="col-md-6">
                            <label for="modalAlertType" class="form-label small fw-bold text-uppercase text-muted" style="letter-spacing: 0.5px;">Emergency Category</label>
                            <select class="form-select border-slate-200 shadow-sm" name="alert_type_id" id="modalAlertType" required>
                                <option value="" selected disabled>Select category...</option>
                            </select>
                        </div>

                        <!-- Title -->
                        <div class="col-md-6">
                            <label for="modalAlertTitle" class="form-label small fw-bold text-uppercase text-muted" style="letter-spacing: 0.5px;">Alert Title</label>
                            <input type="text" class="form-control border-slate-200 shadow-sm" name="title" id="modalAlertTitle" 
                                placeholder="e.g. Chemical Spill at Sector 4" required maxlength="150">
                        </div>

                        <!-- Alert Severity -->
                        <div class="col-md-12">
                            <label for="modalAlertSeverity" class="form-label small fw-bold text-uppercase text-muted" style="letter-spacing: 0.5px;">Incident Severity</label>
                            <select class="form-select border-slate-200 shadow-sm fw-bold" name="severity" id="modalAlertSeverity" required>
                                <option value="Low">Low - Minor Incident</option>
                                <option value="Medium" selected>Medium - Significant Incident</option>
                                <option value="High">High - Critical Emergency</option>
                            </select>
                        </div>

                        <!-- Description -->
                        <div class="col-12">
                            <label for="modalAlertDescription" class="form-label small fw-bold text-uppercase text-muted" style="letter-spacing: 0.5px;">Description & Situation Report</label>
                            <textarea class="form-control border-slate-200 shadow-sm" name="description" id="modalAlertDescription" rows="4" 
                                placeholder="Describe the situation, potential hazards, and immediate requirements..." required></textarea>
                        </div>

                        <!-- Latitude -->
                        <div class="col-md-6">
                            <label for="modalAlertLatitude" class="form-label small fw-bold text-uppercase text-muted" style="letter-spacing: 0.5px;">Latitude</label>
                            <div class="input-group shadow-sm">
                                <span class="input-group-text bg-white border-end-0 text-muted">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" /></svg>
                                </span>
                                <input type="number" class="form-control border-start-0 ps-0" name="latitude" id="modalAlertLatitude" 
                                    placeholder="e.g. 37.7749" required step="0.00000001" min="-90" max="90">
                            </div>
                        </div>

                        <!-- Longitude -->
                        <div class="col-md-6">
                            <label for="modalAlertLongitude" class="form-label small fw-bold text-uppercase text-muted" style="letter-spacing: 0.5px;">Longitude</label>
                            <div class="input-group shadow-sm">
                                <span class="input-group-text bg-white border-end-0 text-muted">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" /></svg>
                                </span>
                                <input type="number" class="form-control border-start-0 ps-0" name="longitude" id="modalAlertLongitude" 
                                    placeholder="e.g. -122.4194" required step="0.00000001" min="-180" max="180">
                            </div>
                        </div>
                    </div>

                    <!-- Coordinate Help -->
                    <div class="mt-4 p-3 rounded-3 bg-info-subtle border-0 d-flex align-items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" class="text-info me-2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z" />
                        </svg>
                        <small class="text-info fw-semibold">Need precise coordinates? Use <a href="https://www.latlong.net/" target="_blank" class="text-info text-decoration-underline">latlong.net</a></small>
                    </div>


                </form>
            </div>

            <!-- Modal Footer -->
            <div class="modal-footer border-top-0 p-4" style="background-color: #f8fafc;">
                <button type="button" class="btn btn-white border shadow-sm px-4" data-bs-dismiss="modal">Discard</button>
                <button type="button" class="btn btn-primary shadow px-4 d-flex align-items-center" id="submitCreateAlertBtn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" class="me-2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                    </svg>
                    Broadcast Alert
                </button>
            </div>
        </div>
    </div>
</div>

<script>
let alertTypesCache = [];

document.addEventListener('DOMContentLoaded', loadAlertTypes);

function loadAlertTypes() {
    fetch('create-alert.php', { method: 'GET', headers: { 'X-Requested-With': 'XMLHttpRequest' } })
    .then(res => res.json())
    .then(data => {
        if (data.alert_types) alertTypesCache = data.alert_types;
    }).catch(err => console.error('Error loading alert types:', err));
}

document.getElementById('createAlertModal').addEventListener('show.bs.modal', function() {
    const select = document.getElementById('modalAlertType');
    while (select.options.length > 1) select.remove(1);
    
    alertTypesCache.forEach(type => {
        const opt = document.createElement('option');
        opt.value = type.id;
        opt.textContent = `${type.name} - ${type.description}`;
        select.appendChild(opt);
    });
});

document.getElementById('submitCreateAlertBtn').addEventListener('click', function() {
    const form = document.getElementById('createAlertForm');
    const msg = document.getElementById('alertModalMessage');
    
    if (!form.checkValidity()) { form.reportValidity(); return; }

    const btn = this;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Broadcasting...';

    fetch('create-alert.php', {
        method: 'POST',
        headers: { 'X-Requested-With': 'XMLHttpRequest' },
        body: new FormData(form)
    })
    .then(res => res.json())
    .then(data => {
        msg.style.display = 'block';
        if (data.success) {
            msg.innerHTML = `<div class="alert bg-success-subtle text-success border-0 shadow-sm py-3 px-4 d-flex align-items-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" class="me-2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" /></svg>
                <span>${data.message}</span>
            </div>`;
            setTimeout(() => location.reload(), 1500);
        } else {
            btn.disabled = false;
            btn.innerHTML = 'Broadcast Alert';
            msg.innerHTML = `<div class="alert bg-danger-subtle text-danger border-0 shadow-sm py-3 px-4 d-flex align-items-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" class="me-2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" /></svg>
                <span>${data.message}</span>
            </div>`;
        }
    })
    .catch(() => {
        btn.disabled = false;
        btn.innerHTML = 'Broadcast Alert';
        msg.innerHTML = `<div class="alert bg-danger-subtle text-danger border-0 shadow-sm py-3 px-4">An error occurred. Please try again.</div>`;
    });
});
</script>
